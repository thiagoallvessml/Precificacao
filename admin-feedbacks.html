<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Feedbacks dos Usuários - Admin PrecificaX</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-dark": "#0F0F0F",
                        "card-dark": "#1E1E1E",
                        "danger": "#ff4d4d",
                        "success": "#22c55e",
                        "warning": "#f59e0b"
                    },
                    fontFamily: { "display": ["Work Sans", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Work Sans', sans-serif;
            background: #0F0F0F;
        }

        .skeleton {
            background: linear-gradient(90deg, #1a2f2f 25%, #243f3f 50%, #1a2f2f 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .feedback-card {
            transition: background 0.2s, border-color 0.2s;
        }

        .feedback-card:hover {
            border-color: rgba(19, 236, 236, 0.15);
        }

        .badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .tipo-duvida {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .tipo-sugestao {
            background: rgba(19, 236, 236, 0.12);
            color: #13ecec;
        }

        .tipo-bug {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .tipo-elogio {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .status-novo {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
        }

        .status-lido {
            background: rgba(148, 163, 184, 0.12);
            color: #94a3b8;
        }

        .status-respondido {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen font-display pb-12">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-background-dark/90 backdrop-blur-xl border-b border-white/5 px-4 py-3">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='admin-dashboard.html'"
                    class="p-2 rounded-lg hover:bg-white/5 transition-colors text-gray-500 hover:text-white">
                    <span class="material-icons-round text-xl">arrow_back</span>
                </button>
                <div>
                    <h1 class="text-base font-bold text-white">Feedbacks dos Usuários</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Admin · PrecificaX</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="carregarFeedbacks()" title="Atualizar"
                    class="p-2 rounded-lg hover:bg-white/5 transition-colors text-gray-500 hover:text-primary">
                    <span class="material-icons-round text-xl">refresh</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6 space-y-5">

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div class="bg-card-dark rounded-xl p-4 border border-white/5">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1">Total</p>
                <p id="statTotal" class="text-2xl font-bold text-white">
                    <span class="skeleton inline-block h-7 w-8 rounded"></span>
                </p>
            </div>
            <div class="bg-card-dark rounded-xl p-4 border border-indigo-500/20">
                <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider mb-1">Novos</p>
                <p id="statNovos" class="text-2xl font-bold text-indigo-400">
                    <span class="skeleton inline-block h-7 w-8 rounded"></span>
                </p>
            </div>
            <div class="bg-card-dark rounded-xl p-4 border border-white/5">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1">Lidos</p>
                <p id="statLidos" class="text-2xl font-bold text-gray-400">
                    <span class="skeleton inline-block h-7 w-8 rounded"></span>
                </p>
            </div>
            <div class="bg-card-dark rounded-xl p-4 border border-success/20">
                <p class="text-[10px] text-success font-bold uppercase tracking-wider mb-1">Respondidos</p>
                <p id="statRespondidos" class="text-2xl font-bold text-success">
                    <span class="skeleton inline-block h-7 w-8 rounded"></span>
                </p>
            </div>
        </div>

        <!-- Filtros -->
        <div class="flex flex-wrap gap-2 items-center">
            <!-- Tipo -->
            <select id="filterTipo" onchange="carregarFeedbacks()"
                class="bg-card-dark border border-white/10 rounded-lg text-xs text-gray-400 py-2 px-3 outline-none focus:border-primary">
                <option value="">Todos os tipos</option>
                <option value="duvida">❓ Dúvida</option>
                <option value="sugestao">💡 Sugestão</option>
                <option value="bug">🐛 Bug</option>
                <option value="elogio">⭐ Elogio</option>
            </select>
            <!-- Status -->
            <select id="filterStatus" onchange="carregarFeedbacks()"
                class="bg-card-dark border border-white/10 rounded-lg text-xs text-gray-400 py-2 px-3 outline-none focus:border-primary">
                <option value="">Todos os status</option>
                <option value="novo">🔵 Novo</option>
                <option value="lido">⚪ Lido</option>
                <option value="respondido">✅ Respondido</option>
            </select>
            <span id="totalLabel" class="text-xs text-gray-600 ml-auto"></span>
        </div>

        <!-- Lista de Feedbacks -->
        <div id="feedbacksList" class="space-y-3">
            <!-- Skeletons -->
            <div class="skeleton h-28 rounded-xl"></div>
            <div class="skeleton h-28 rounded-xl"></div>
            <div class="skeleton h-28 rounded-xl"></div>
        </div>
    </main>

    <!-- Modal de Detalhe -->
    <div id="detalheModal"
        class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4"
        style="display:none;">
        <div
            class="bg-card-dark rounded-2xl max-w-lg w-full p-6 border border-white/10 space-y-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between">
                <h3 class="text-sm font-bold text-white flex items-center gap-2">
                    <span class="material-icons-round text-primary">chat_bubble</span>
                    Detalhe do Feedback
                </h3>
                <button onclick="fecharDetalhe()" class="p-1 rounded-full hover:bg-white/10 transition-colors">
                    <span class="material-icons-round text-gray-500">close</span>
                </button>
            </div>

            <!-- Info do usuário -->
            <div class="bg-background-dark rounded-xl p-4 space-y-2">
                <div class="flex items-center gap-3">
                    <div id="modalAvatar"
                        class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
                        <span class="text-sm font-bold text-primary">??</span>
                    </div>
                    <div>
                        <p id="modalNome" class="text-sm font-bold text-white">—</p>
                        <p id="modalEmail" class="text-xs text-gray-500">—</p>
                    </div>
                    <div class="ml-auto flex flex-col items-end gap-1">
                        <span id="modalTipoBadge" class="badge">—</span>
                        <span id="modalStatusBadge" class="badge">—</span>
                    </div>
                </div>
                <p id="modalData" class="text-[10px] text-gray-600"></p>
            </div>

            <!-- Mensagem -->
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-2">Mensagem</p>
                <div id="modalMensagem"
                    class="text-sm text-white bg-background-dark rounded-xl p-4 leading-relaxed border border-white/5">
                </div>
            </div>

            <!-- Ações -->
            <div class="flex gap-2 pt-1">
                <button id="btnMarcarLido" onclick="atualizarStatus('lido')"
                    class="flex-1 py-2.5 rounded-xl border border-white/10 text-gray-400 font-semibold text-xs hover:bg-white/5 transition-all flex items-center justify-center gap-1">
                    <span class="material-icons-round text-base">visibility</span>
                    Marcar Lido
                </button>
                <button id="btnMarcarRespondido" onclick="atualizarStatus('respondido')"
                    class="flex-1 py-2.5 rounded-xl bg-success/10 border border-success/30 text-success font-semibold text-xs hover:bg-success/20 transition-all flex items-center justify-center gap-1">
                    <span class="material-icons-round text-base">check_circle</span>
                    Respondido
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { getSupabase } from './supabase-client.js';
        import { protectPage } from './auth-guard.js';

        const sb = getSupabase();
        let currentFeedbackId = null;

        const TIPO_LABELS = {
            duvida: { label: 'Dúvida', cls: 'tipo-duvida', icon: 'help' },
            sugestao: { label: 'Sugestão', cls: 'tipo-sugestao', icon: 'lightbulb' },
            bug: { label: 'Bug', cls: 'tipo-bug', icon: 'bug_report' },
            elogio: { label: 'Elogio', cls: 'tipo-elogio', icon: 'star' },
        };
        const STATUS_LABELS = {
            novo: { label: 'Novo', cls: 'status-novo' },
            lido: { label: 'Lido', cls: 'status-lido' },
            respondido: { label: 'Respondido', cls: 'status-respondido' },
        };

        async function init() {
            const perfil = await protectPage(['admin']);
            if (!perfil) return;
            await carregarFeedbacks();
        }

        window.carregarFeedbacks = async function () {
            if (!sb) return;
            const tipo = document.getElementById('filterTipo').value;
            const status = document.getElementById('filterStatus').value;

            let q = sb.from('feedbacks').select('*').order('created_at', { ascending: false });
            if (tipo) q = q.eq('tipo', tipo);
            if (status) q = q.eq('status', status);

            const { data, error } = await q;
            if (error) { console.error(error); return; }

            // Stats
            const { data: all } = await sb.from('feedbacks').select('status');
            if (all) {
                document.getElementById('statTotal').textContent = all.length;
                document.getElementById('statNovos').textContent = all.filter(f => f.status === 'novo').length;
                document.getElementById('statLidos').textContent = all.filter(f => f.status === 'lido').length;
                document.getElementById('statRespondidos').textContent = all.filter(f => f.status === 'respondido').length;
            }

            document.getElementById('totalLabel').textContent = `${data.length} resultado${data.length !== 1 ? 's' : ''}`;

            const lista = document.getElementById('feedbacksList');
            if (data.length === 0) {
                lista.innerHTML = `
                    <div class="text-center py-16 text-gray-600">
                        <span class="material-icons-round text-5xl block mb-3">chat_bubble_outline</span>
                        <p class="text-sm font-medium">Nenhum feedback encontrado</p>
                    </div>`;
                return;
            }

            lista.innerHTML = data.map(f => {
                const tipo = TIPO_LABELS[f.tipo] || { label: f.tipo, cls: 'tipo-sugestao', icon: 'chat_bubble' };
                const status = STATUS_LABELS[f.status] || { label: f.status, cls: 'status-novo' };
                const data_f = new Date(f.created_at).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                const initials = (f.nome || f.email || '??').substring(0, 2).toUpperCase();
                const msgPreview = f.mensagem.length > 120 ? f.mensagem.substring(0, 120) + '…' : f.mensagem;

                return `
                <div class="feedback-card bg-card-dark rounded-xl border border-white/5 p-4 cursor-pointer hover:border-primary/20 transition-all"
                     onclick="abrirDetalhe(${f.id})">
                    <div class="flex items-start gap-3">
                        <!-- Avatar -->
                        <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0 mt-0.5">
                            <span class="text-sm font-bold text-primary">${initials}</span>
                        </div>
                        <!-- Conteúdo -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap mb-1">
                                <p class="text-sm font-semibold text-white">${f.nome || 'Anônimo'}</p>
                                <span class="badge ${tipo.cls}">${tipo.label}</span>
                                <span class="badge ${status.cls}">${status.label}</span>
                                <span class="text-[10px] text-gray-600 ml-auto">${data_f}</span>
                            </div>
                            <p class="text-xs text-gray-500 mb-2">${f.email || '—'}</p>
                            <p class="text-sm text-gray-300 leading-relaxed">${msgPreview}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        };

        // Detalhe
        window.abrirDetalhe = async function (id) {
            const { data: f, error } = await sb.from('feedbacks').select('*').eq('id', id).single();
            if (error || !f) return;
            currentFeedbackId = id;

            const tipo = TIPO_LABELS[f.tipo] || { label: f.tipo, cls: 'tipo-sugestao' };
            const status = STATUS_LABELS[f.status] || { label: f.status, cls: 'status-novo' };
            const initials = (f.nome || f.email || '??').substring(0, 2).toUpperCase();
            const data_f = new Date(f.created_at).toLocaleString('pt-BR');

            document.getElementById('modalAvatar').innerHTML = `<span class="text-sm font-bold text-primary">${initials}</span>`;
            document.getElementById('modalNome').textContent = f.nome || 'Anônimo';
            document.getElementById('modalEmail').textContent = f.email || '—';
            document.getElementById('modalData').textContent = `Enviado em ${data_f}`;
            document.getElementById('modalMensagem').textContent = f.mensagem;

            const tipoBadge = document.getElementById('modalTipoBadge');
            const statusBadge = document.getElementById('modalStatusBadge');
            tipoBadge.textContent = tipo.label;
            tipoBadge.className = `badge ${tipo.cls}`;
            statusBadge.textContent = status.label;
            statusBadge.className = `badge ${status.cls}`;

            // Botões de ação — desabilita o status atual
            document.getElementById('btnMarcarLido').disabled = f.status === 'lido';
            document.getElementById('btnMarcarRespondido').disabled = f.status === 'respondido';

            const modal = document.getElementById('detalheModal');
            modal.style.display = 'flex';

            // Se estava novo, marcar automaticamente como lido
            if (f.status === 'novo') {
                await sb.from('feedbacks').update({ status: 'lido' }).eq('id', id);
                await carregarFeedbacks();
            }
        };

        window.fecharDetalhe = function () {
            document.getElementById('detalheModal').style.display = 'none';
            currentFeedbackId = null;
            carregarFeedbacks();
        };

        window.atualizarStatus = async function (novoStatus) {
            if (!currentFeedbackId) return;
            const { error } = await sb.from('feedbacks').update({ status: novoStatus }).eq('id', currentFeedbackId);
            if (error) { alert('Erro ao atualizar: ' + error.message); return; }

            // Atualiza badge do modal
            const status = STATUS_LABELS[novoStatus];
            const statusBadge = document.getElementById('modalStatusBadge');
            statusBadge.textContent = status.label;
            statusBadge.className = `badge ${status.cls}`;

            document.getElementById('btnMarcarLido').disabled = novoStatus === 'lido';
            document.getElementById('btnMarcarRespondido').disabled = novoStatus === 'respondido';

            // Toast
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#13ecec;color:#0F0F0F;font-weight:700;font-size:13px;padding:12px 20px;border-radius:12px;z-index:9999;';
            toast.textContent = novoStatus === 'respondido' ? '✅ Marcado como respondido!' : '👁️ Marcado como lido!';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);

            await carregarFeedbacks();
        };

        init();
    </script>

</body>

</html>

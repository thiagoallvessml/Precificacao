<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ingredientes Mais Usados - PrecificaX</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-dark": "#0F0F0F",
                        "card-dark": "#1E1E1E",
                        "border-dark": "#2A2A2A",
                    },
                    fontFamily: { "display": ["Work Sans", "sans-serif"] },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #0F0F0F;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-border-dark px-4 py-4">
        <div class="flex items-center gap-4 max-w-7xl mx-auto">
            <button onclick="window.history.back()"
                class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold tracking-tight">Ingredientes Mais Usados</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pt-6">

        <!-- Filter Chips -->
        <div class="flex gap-3 overflow-x-auto scrollbar-hide pb-4">
            <button onclick="setPeriodo('mes')" id="chip-mes"
                class="flex h-9 shrink-0 items-center justify-center rounded-full bg-primary px-5 text-background-dark text-sm font-semibold">
                Este Mês
            </button>
            <button onclick="setPeriodo('tri')" id="chip-tri"
                class="flex h-9 shrink-0 items-center justify-center rounded-full bg-card-dark border border-border-dark px-5 text-slate-300 text-sm font-medium hover:bg-border-dark transition-colors">
                Últimos 3 Meses
            </button>
            <button onclick="setPeriodo('ano')" id="chip-ano"
                class="flex h-9 shrink-0 items-center justify-center rounded-full bg-card-dark border border-border-dark px-5 text-slate-300 text-sm font-medium hover:bg-border-dark transition-colors">
                Este Ano
            </button>
        </div>

        <!-- Desktop: 2 colunas | Mobile: 1 coluna -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- COLUNA ESQUERDA: Summary + Gráfico -->
            <div class="space-y-6">

                <!-- Summary Cards: 3 colunas no desktop esquerdo -->
                <div class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-1 xl:grid-cols-3 gap-4">
                    <div class="bg-card-dark border border-border-dark p-4 rounded-xl flex items-center gap-4">
                        <div class="bg-primary/10 p-3 rounded-lg shrink-0">
                            <span class="material-symbols-outlined text-primary">inventory_2</span>
                        </div>
                        <div>
                            <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Total em Uso</p>
                            <p id="statTotal" class="text-lg font-bold text-white">—</p>
                        </div>
                    </div>
                    <div class="bg-card-dark border border-border-dark p-4 rounded-xl flex items-center gap-4">
                        <div class="bg-primary/10 p-3 rounded-lg shrink-0">
                            <span class="material-symbols-outlined text-primary">star</span>
                        </div>
                        <div class="min-w-0">
                            <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Líder</p>
                            <p id="statLider" class="text-base font-bold text-white truncate">—</p>
                        </div>
                    </div>
                    <div class="bg-card-dark border border-border-dark p-4 rounded-xl flex items-center gap-4">
                        <div class="bg-primary/10 p-3 rounded-lg shrink-0">
                            <span class="material-symbols-outlined text-primary">payments</span>
                        </div>
                        <div>
                            <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Custo Total</p>
                            <p id="statCusto" class="text-base font-bold text-primary">R$ —</p>
                        </div>
                    </div>
                </div>

                <!-- Gráfico Top 5 -->
                <section class="space-y-4">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">leaderboard</span>
                        Top 5 Ingredientes
                    </h2>
                    <div class="bg-card-dark border border-border-dark p-6 rounded-xl">
                        <div id="chartBars" class="flex items-end justify-between gap-2" style="height:180px">
                            <div class="text-center text-slate-500 text-sm w-full flex items-center justify-center">
                                <span class="material-symbols-outlined animate-spin mr-2">sync</span> Carregando...
                            </div>
                        </div>
                    </div>
                </section>

            </div>

            <!-- COLUNA DIREITA: Ranking Detalhado -->
            <div class="space-y-4">
                <h2 class="text-lg font-bold">Detalhamento por Item</h2>
                <div id="rankingList" class="space-y-4">
                    <div class="text-center text-slate-500 text-sm py-8">
                        <span class="material-symbols-outlined animate-spin">sync</span>
                    </div>
                </div>
            </div>

        </div>

    </main>



    <script type="module">
        import { getSupabase } from './supabase-client.js';
        const supabase = getSupabase();

        const pad = n => String(n).padStart(2, '0');
        const fmt = v => `R$ ${parseFloat(v || 0).toFixed(2).replace('.', ',')}`;

        let periodo = 'mes';
        let todosInsumosData = []; // dados completos do Supabase
        let insumosMap = {}; // id → insumo
        let receitasInsumos = []; // receita_id, insumo_id, quantidade

        // ─── PERÍODO ──────────────────────────────────────────────────────────────
        window.setPeriodo = function (p) {
            periodo = p;
            ['mes', 'tri', 'ano'].forEach(t => {
                const btn = document.getElementById('chip-' + t);
                btn.className = t === p
                    ? 'flex h-9 shrink-0 items-center justify-center rounded-full bg-primary px-5 text-background-dark text-sm font-semibold'
                    : 'flex h-9 shrink-0 items-center justify-center rounded-full bg-card-dark border border-border-dark px-5 text-slate-300 text-sm font-medium hover:bg-border-dark transition-colors';
            });
            calcularERender();
        };

        function getIntervalo() {
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = hoje.getMonth();
            let inicio;
            if (periodo === 'mes') {
                inicio = new Date(ano, mes, 1);
            } else if (periodo === 'tri') {
                inicio = new Date(ano, mes - 2, 1);
            } else {
                inicio = new Date(ano, 0, 1);
            }
            return `${inicio.getFullYear()}-${pad(inicio.getMonth() + 1)}-${pad(inicio.getDate())}`;
        }

        // ─── CALCULAR + RENDER ────────────────────────────────────────────────────
        function calcularERender() {
            const dataInicio = getIntervalo();

            // Filtrar produções do período
            const producoesPeriodo = todosInsumosData.filter(p =>
                (p.data_producao || '').split('T')[0] >= dataInicio
            );

            // Calcular consumo total por insumo_id
            const consumo = {}; // insumo_id → { qtdTotal, custoTotal }
            producoesPeriodo.forEach(prod => {
                const riDaReceita = receitasInsumos.filter(r => r.receita_id === prod.receita_id);
                const lotes = prod.quantidade_lotes || 1;
                riDaReceita.forEach(ri => {
                    const ins = insumosMap[ri.insumo_id];
                    if (!ins) return;
                    const qtd = (parseFloat(ri.quantidade) || 0) * lotes;
                    const custo = qtd * (parseFloat(ins.custo_unitario) || 0);
                    if (!consumo[ri.insumo_id]) consumo[ri.insumo_id] = { qtdTotal: 0, custoTotal: 0, ins };
                    consumo[ri.insumo_id].qtdTotal += qtd;
                    consumo[ri.insumo_id].custoTotal += custo;
                });
            });

            const ranking = Object.entries(consumo)
                .map(([id, v]) => ({ id, ...v }))
                .sort((a, b) => b.qtdTotal - a.qtdTotal);

            // Stats
            const custoTotal = ranking.reduce((s, r) => s + r.custoTotal, 0);
            document.getElementById('statTotal').textContent = ranking.length + ' itens';
            document.getElementById('statLider').textContent = ranking.length > 0 ? ranking[0].ins.nome : '—';
            document.getElementById('statCusto').textContent = fmt(custoTotal);

            renderChart(ranking.slice(0, 5));
            renderRanking(ranking.slice(0, 20), custoTotal);
        }

        // ─── GRÁFICO ──────────────────────────────────────────────────────────────
        function renderChart(top5) {
            const container = document.getElementById('chartBars');
            if (top5.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-sm text-center w-full">Sem dados no período</p>`;
                return;
            }
            const maxVal = top5[0].qtdTotal;
            const MAX_PX = 120;
            const opacidades = ['1', '0.7', '0.5', '0.3', '0.2'];
            container.innerHTML = top5.map((r, idx) => {
                const px = Math.max(Math.round((r.qtdTotal / maxVal) * MAX_PX), 4);
                const nome = r.ins.nome.split(' ')[0]; // 1ª palavra
                return `
                    <div class="flex flex-col-reverse items-center flex-1 gap-1">
                        <span class="text-[10px] text-slate-400 text-center truncate w-full">${nome}</span>
                        <div class="relative group cursor-default w-full rounded-t-lg" style="height:${px}px; background:rgba(19,236,236,${opacidades[idx]})">
                            <div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-white opacity-0 group-hover:opacity-100 whitespace-nowrap">
                                ${r.qtdTotal.toFixed(1)} ${r.ins.unidade_medida || 'un'}
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // ─── RANKING DETALHADO ────────────────────────────────────────────────────
        function renderRanking(ranking, custoTotal) {
            const container = document.getElementById('rankingList');
            if (ranking.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-8">Nenhuma produção encontrada no período.</p>`;
                return;
            }
            const maxQtd = ranking[0].qtdTotal || 1;
            container.innerHTML = ranking.map((r, idx) => {
                const ins = r.ins;
                const pct = Math.round((r.qtdTotal / maxQtd) * 100);
                const impacto = custoTotal > 0 ? Math.round((r.custoTotal / custoTotal) * 100) : 0;
                return `
                    <div class="bg-card-dark border border-border-dark p-5 rounded-xl space-y-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-base font-bold text-white">${ins.nome}</h3>
                                <p class="text-primary text-sm font-medium">Impacto: ${impacto}% do custo total</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-slate-400 uppercase tracking-widest">Rank #${idx + 1}</p>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between text-xs text-slate-300">
                                <span>Frequência de Uso</span>
                                <span>${pct}%</span>
                            </div>
                            <div class="w-full bg-border-dark h-2 rounded-full overflow-hidden">
                                <div class="bg-primary h-full rounded-full transition-all" style="width:${pct}%"></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <div>
                                <p class="text-[10px] text-slate-400 uppercase tracking-wider">Qtd Consumida</p>
                                <p class="text-sm font-semibold text-slate-100">${r.qtdTotal.toFixed(2)} ${ins.unidade_medida || 'un'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-400 uppercase tracking-wider">Custo no Período</p>
                                <p class="text-sm font-semibold text-primary">${fmt(r.custoTotal)}</p>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // ─── LOAD ─────────────────────────────────────────────────────────────────
        async function loadData() {
            try {
                const [
                    { data: producoesRaw },
                    { data: riRaw },
                    { data: insumosRaw },
                ] = await Promise.all([
                    supabase.from('producoes').select('receita_id, data_producao, quantidade_lotes'),
                    supabase.from('receitas_insumos').select('receita_id, insumo_id, quantidade'),
                    supabase.from('insumos').select('id, nome, custo_unitario, unidade_medida').eq('ativo', true),
                ]);

                todosInsumosData = producoesRaw || [];
                receitasInsumos = riRaw || [];
                (insumosRaw || []).forEach(i => { insumosMap[i.id] = i; });

                calcularERender();
            } catch (err) {
                console.error('❌ Erro:', err);
                document.getElementById('rankingList').innerHTML = `
                    <div class="text-center text-red-400 py-8">
                        <span class="material-symbols-outlined">error</span>
                        <p class="text-sm mt-2">${err.message}</p>
                    </div>`;
            }
        }

        loadData();
    </script>

</body>

</html>

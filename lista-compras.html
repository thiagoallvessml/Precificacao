<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Lista de Compras - PrecificaX</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: { "display": ["Work Sans"] },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Work Sans', sans-serif; min-height: max(884px, 100dvh); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .abc-badge-a { background: rgba(19,236,236,0.1); border: 1px solid #13ecec; color: #13ecec; }
        .abc-badge-b { background: rgba(255,215,0,0.1); border: 1px solid #ffd700; color: #ffd700; }
        .abc-badge-c { background: rgba(169,169,169,0.1); border: 1px solid #a9a9a9; color: #a9a9a9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .skeleton { background: linear-gradient(90deg, #1a2e2e 25%, #22403f 50%, #1a2e2e 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0.75rem; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .item-card.comprado h4 { text-decoration: line-through; }
        .compra-inputs { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, opacity 0.25s ease, visibility 0s linear 0.35s; opacity: 0; visibility: hidden; pointer-events: none; }
        .compra-inputs.aberto { max-height: 180px; opacity: 1; visibility: visible; pointer-events: auto; transition: max-height 0.35s ease, opacity 0.25s ease, visibility 0s linear 0s; }
        .input-compra { background: rgba(19,236,236,0.05); border: 1px solid rgba(19,236,236,0.2); border-radius: 0.5rem; padding: 0.4rem 0.6rem; color: #e2e8f0; font-size: 0.8rem; width: 100%; outline: none; transition: border-color 0.2s; }
        .input-compra:focus { border-color: #13ecec; background: rgba(19,236,236,0.1); }
        .input-compra::placeholder { color: #475569; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-10 bg-background-light dark:bg-background-dark border-b border-primary/10">
        <div class="flex items-center p-4 gap-4">
            <button onclick="window.history.back()" class="p-2 hover:bg-primary/10 rounded-full transition-colors">
                <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold tracking-tight">Lista de Compras Inteligente</h1>
        </div>

        <!-- Summary Cards -->
        <div class="flex gap-3 px-4 pb-4">
            <div class="flex-1 bg-primary/10 border border-primary/20 rounded-xl p-4">
                <p class="text-xs font-medium text-primary/70 uppercase tracking-wider">Investimento Total</p>
                <p id="totalInvestimento" class="text-xl font-bold text-primary">R$ —</p>
            </div>
            <div class="flex-1 bg-slate-800/40 border border-slate-700 rounded-xl p-4">
                <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Itens Sugeridos</p>
                <p id="totalItens" class="text-xl font-bold text-slate-100">—</p>
            </div>
        </div>

        <!-- Tabs ABC -->
        <div class="flex border-b border-slate-800 px-4 overflow-x-auto no-scrollbar" id="tabsContainer">
            <button onclick="setTab('todos')" id="tab-todos" class="tab-btn flex-none px-4 py-3 text-sm font-bold border-b-2 border-primary text-primary">Todos</button>
            <button onclick="setTab('A')" id="tab-A" class="tab-btn flex-none px-4 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-200">Classe A</button>
            <button onclick="setTab('B')" id="tab-B" class="tab-btn flex-none px-4 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-200">Classe B</button>
            <button onclick="setTab('C')" id="tab-C" class="tab-btn flex-none px-4 py-3 text-sm font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-200">Classe C</button>
        </div>
    </header>

    <!-- Main: lista de itens -->
    <main class="flex-1 p-4 pb-40 space-y-3" id="mainContent">
        <!-- Skeletons de carregamento -->
        <div class="skeleton h-36"></div>
        <div class="skeleton h-36 opacity-70"></div>
        <div class="skeleton h-36 opacity-40"></div>
    </main>

    <!-- Estado vazio -->
    <div id="emptyState" class="hidden flex-1 flex flex-col items-center justify-center py-24 text-center gap-4 px-8">
        <span class="material-symbols-outlined text-6xl text-slate-700">check_circle</span>
        <div>
            <p class="text-slate-300 font-bold text-lg">Estoque em dia! ✅</p>
            <p class="text-slate-500 text-sm mt-1">Nenhum insumo abaixo do estoque mínimo no momento.</p>
        </div>
    </div>

    <!-- Footer Action Bar -->
    <footer class="fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 p-4 pb-8 space-y-3 shadow-2xl z-20">
        <div class="flex justify-between items-center px-1">
            <div>
                <p class="text-xs text-slate-400">Total Selecionado</p>
                <p id="totalSelecionado" class="text-lg font-bold text-primary">R$ 0,00 <span id="countSelecionado" class="text-slate-500 text-sm font-normal">(0 itens)</span></p>
            </div>
            <button onclick="marcarTodos()" class="text-xs text-primary border border-primary/30 px-3 py-1.5 rounded-full hover:bg-primary/10 transition-colors">
                Selecionar todos
            </button>
        </div>
        <button onclick="registrarEntradas()" class="w-full bg-primary hover:bg-primary/90 text-slate-900 font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 disabled:opacity-40">
            <span class="material-symbols-outlined">shopping_cart_checkout</span>
            Finalizar Compra e Registrar Entrada
        </button>
    </footer>

    <script type="module">
        import { getAllRecords, insertRecord } from './supabase-utils.js';
        import { getSupabase } from './supabase-client.js';

        const supabase = getSupabase();

        // ── Auth ────────────────────────────────────────────────
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.replace('login.html'); }
        } catch (e) { window.location.replace('login.html'); }

        // ── Estado ──────────────────────────────────────────────
        let todosItens = [];       // lista final classificada
        let selecionados = new Set(); // IDs selecionados
        let tabAtiva = 'todos';

        const fmt = v => `R$ ${parseFloat(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        const fmtQtd = (v, un) => `${parseFloat(v || 0).toLocaleString('pt-BR', { maximumFractionDigits: 2 })} ${un || ''}`.trim();

        // ── Tab ─────────────────────────────────────────────────
        window.setTab = function (t) {
            tabAtiva = t;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-primary', 'text-primary', 'font-bold');
                b.classList.add('text-slate-400', 'border-transparent', 'font-medium');
            });
            const active = document.getElementById('tab-' + t);
            active.classList.add('border-primary', 'text-primary', 'font-bold');
            active.classList.remove('text-slate-400', 'border-transparent', 'font-medium');
            renderLista();
        };

        // ── Classificar ABC por valor total sugerido ─────────────
        function classificarABC(itens) {
            // Ordenar por valor sugerido desc
            const sorted = [...itens].sort((a, b) => b.valorSugerido - a.valorSugerido);
            const total = sorted.reduce((s, i) => s + i.valorSugerido, 0);
            let acumulado = 0;
            sorted.forEach(i => {
                acumulado += i.valorSugerido;
                const pct = total > 0 ? (acumulado / total) * 100 : 0;
                i.classe = pct <= 80 ? 'A' : pct <= 95 ? 'B' : 'C';
            });
            return sorted;
        }

        // ── Render ───────────────────────────────────────────────
        function renderLista() {
            const main = document.getElementById('mainContent');
            const empty = document.getElementById('emptyState');

            const filtrados = tabAtiva === 'todos'
                ? todosItens
                : todosItens.filter(i => i.classe === tabAtiva);

            if (todosItens.length === 0) {
                main.innerHTML = '';
                empty.classList.remove('hidden');
                empty.classList.add('flex');
                return;
            }
            empty.classList.add('hidden');
            empty.classList.remove('flex');

            if (filtrados.length === 0) {
                main.innerHTML = `<div class="text-center py-16 text-slate-500"><p class="font-semibold">Nenhum item na Classe ${tabAtiva}</p></div>`;
                return;
            }

            const badgeCls = { A: 'abc-badge-a', B: 'abc-badge-b', C: 'abc-badge-c' };
            const corEstoque = (atual, min) => {
                const pct = min > 0 ? (atual / min) * 100 : 100;
                if (pct <= 30) return 'text-rose-400';
                if (pct <= 70) return 'text-amber-400';
                return 'text-slate-300';
            };
            const labelEstoque = (atual, min) => {
                const pct = min > 0 ? (atual / min) * 100 : 100;
                if (pct <= 30) return ' (Crítico)';
                if (pct <= 70) return ' (Atenção)';
                return '';
            };

            // Agrupar por classe
            const grupos = tabAtiva === 'todos'
                ? [
                    { label: 'Sugestões Prioritárias (Classe A)', itens: filtrados.filter(i => i.classe === 'A') },
                    { label: 'Sugestões Complementares (Classe B)', itens: filtrados.filter(i => i.classe === 'B') },
                    { label: 'Itens Secundários (Classe C)', itens: filtrados.filter(i => i.classe === 'C') },
                ]
                : [{ label: `Classe ${tabAtiva}`, itens: filtrados }];

            let html = '';
            grupos.filter(g => g.itens.length > 0).forEach(grupo => {
                html += `<h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest pt-2 pb-1">${grupo.label}</h3>`;
                grupo.itens.forEach(item => {
                    const checked = selecionados.has(item.id);
                    const sugestao = Math.max(item.estoque_minimo - item.estoque_atual, item.estoque_minimo);
                    const qtdSalva = item._qtdComprada ?? sugestao;
                    const precoSalvo = item._precoUnitPago ?? parseFloat(item.custo_unitario || 0);
                    html += `
                    <div class="item-card bg-slate-800/50 border border-slate-700 rounded-xl p-4 flex gap-4" data-id="${item.id}">
                        <div class="flex-none self-start mt-1">
                            <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleItem(${item.id})"
                                class="w-6 h-6 rounded border-slate-600 bg-slate-800 text-primary focus:ring-primary cursor-pointer" />
                        </div>
                        <div class="flex-1 flex flex-col gap-2">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-bold text-slate-100 ${checked ? 'line-through opacity-60' : ''}">${item.nome}</h4>
                                    <p class="text-xs text-slate-400">${item.tipo ? item.tipo.charAt(0).toUpperCase() + item.tipo.slice(1) : 'Insumo'}${item.fornecedor ? ' · ' + item.fornecedor : ''}</p>
                                </div>
                                <span class="${badgeCls[item.classe]} px-2 py-0.5 rounded text-[10px] font-bold tracking-tighter">CLASSE ${item.classe}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-4 py-2 border-y border-slate-700/50">
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase">Estoque Atual</p>
                                    <p class="text-sm font-semibold ${corEstoque(item.estoque_atual, item.estoque_minimo)}">
                                        ${fmtQtd(item.estoque_atual, item.unidade_medida)}${labelEstoque(item.estoque_atual, item.estoque_minimo)}
                                    </p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-500 uppercase">Sugestão Compra</p>
                                    <p class="text-sm font-semibold text-primary">+${fmtQtd(sugestao, item.unidade_medida)}</p>
                                </div>
                            </div>

                            <!-- Inputs: qtd + preço unit + preço total (bidirecionais) -->
                            <div class="compra-inputs ${checked ? 'aberto' : ''}" id="inputs-${item.id}">
                                <div class="grid grid-cols-3 gap-2 pt-2 pb-1">
                                    <div>
                                        <label class="text-[10px] text-primary uppercase font-bold tracking-wider block mb-1">
                                            Qtd (${item.unidade_medida || 'un'})
                                        </label>
                                        <input type="number" min="0" step="0.001"
                                            id="qtd-${item.id}"
                                            value="${qtdSalva.toFixed ? qtdSalva.toFixed(3).replace(/\.?0+$/, '') : qtdSalva}"
                                            oninput="salvarQtd(${item.id})"
                                            placeholder="${sugestao}"
                                            class="input-compra" />
                                    </div>
                                    <div>
                                        <label class="text-[10px] text-primary uppercase font-bold tracking-wider block mb-1">
                                            Preço Unit. (R$)
                                        </label>
                                        <input type="number" min="0" step="0.01"
                                            id="preco-${item.id}"
                                            value="${precoSalvo.toFixed(2)}"
                                            oninput="salvarPrecoUnit(${item.id})"
                                            placeholder="${parseFloat(item.custo_unitario || 0).toFixed(2)}"
                                            class="input-compra" />
                                    </div>
                                    <div>
                                        <label class="text-[10px] text-amber-400 uppercase font-bold tracking-wider block mb-1">
                                            Total Pago (R$)
                                        </label>
                                        <input type="number" min="0" step="0.01"
                                            id="total-${item.id}"
                                            value="${(qtdSalva * precoSalvo).toFixed(2)}"
                                            oninput="salvarPrecoTotal(${item.id})"
                                            placeholder="0,00"
                                            class="input-compra" style="border-color: rgba(245,158,11,0.4);" />
                                    </div>
                                </div>
                                <p class="text-[10px] text-slate-500 pt-0.5 pb-1">💡 Preencha qualquer campo — os outros calculam automaticamente</p>
                            </div>

                            <div class="flex justify-between items-center ${checked ? 'pt-0' : 'pt-1'}">
                                <div class="flex gap-3 text-[11px] text-slate-400">
                                    <span class="flex items-center gap-1">
                                        <span class="material-symbols-outlined text-[14px]">inventory_2</span>
                                        Min: ${fmtQtd(item.estoque_minimo, item.unidade_medida)}
                                    </span>
                                    ${item.estoque_maximo ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">expand</span> Max: ${fmtQtd(item.estoque_maximo, item.unidade_medida)}</span>` : ''}
                                </div>
                                <p class="text-sm font-bold text-slate-400 line-through">${fmt(item.valorSugerido)}</p>
                            </div>
                        </div>
                    </div>`;
                });
            });

            main.innerHTML = html;
            atualizarFooter();
        }

        // ── Helpers de input bidirecional ────────────────────────
        function _getInputEls(id) {
            return {
                qtdEl:   document.getElementById('qtd-'   + id),
                precoEl: document.getElementById('preco-' + id),
                totalEl: document.getElementById('total-' + id),
            };
        }
        function _syncItem(id, qtd, preco) {
            const item = todosItens.find(i => i.id === id);
            if (!item) return;
            item._qtdComprada   = qtd;
            item._precoUnitPago = preco;
            atualizarFooter();
        }

        // Usuário digitou na qtd → recalcula total (mantém preço unit)
        window.salvarQtd = function (id) {
            const { qtdEl, precoEl, totalEl } = _getInputEls(id);
            const qtd   = parseFloat(qtdEl?.value  || 0);
            const preco = parseFloat(precoEl?.value || 0);
            if (totalEl) totalEl.value = (qtd * preco).toFixed(2);
            _syncItem(id, qtd, preco);
        };

        // Usuário digitou no preço unit → recalcula total
        window.salvarPrecoUnit = function (id) {
            const { qtdEl, precoEl, totalEl } = _getInputEls(id);
            const qtd   = parseFloat(qtdEl?.value  || 0);
            const preco = parseFloat(precoEl?.value || 0);
            if (totalEl) totalEl.value = (qtd * preco).toFixed(2);
            _syncItem(id, qtd, preco);
        };

        // Usuário digitou no total → recalcula preço unit (total ÷ qtd)
        window.salvarPrecoTotal = function (id) {
            const { qtdEl, precoEl, totalEl } = _getInputEls(id);
            const qtd   = parseFloat(qtdEl?.value   || 0);
            const total = parseFloat(totalEl?.value  || 0);
            const preco = qtd > 0 ? total / qtd : 0;
            if (precoEl) precoEl.value = preco.toFixed(2);
            _syncItem(id, qtd, preco);
        };

        // ── Toggle seleção ───────────────────────────────────────
        window.toggleItem = function (id) {
            if (selecionados.has(id)) selecionados.delete(id);
            else selecionados.add(id);

            // Expande/recolhe inputs
            const painel = document.getElementById('inputs-' + id);
            if (painel) painel.classList.toggle('aberto', selecionados.has(id));

            // Risco no nome
            const h4 = document.querySelector(`.item-card[data-id="${id}"] h4`);
            if (h4) h4.classList.toggle('line-through', selecionados.has(id));
            if (h4) h4.classList.toggle('opacity-60', selecionados.has(id));

            atualizarFooter();
        };

        window.marcarTodos = function () {
            const visiveis = tabAtiva === 'todos' ? todosItens : todosItens.filter(i => i.classe === tabAtiva);
            const todosJaMarcados = visiveis.every(i => selecionados.has(i.id));
            if (todosJaMarcados) {
                visiveis.forEach(i => selecionados.delete(i.id));
            } else {
                visiveis.forEach(i => selecionados.add(i.id));
            }
            renderLista();
        };

        function getValorReal(item) {
            const qtd = item._qtdComprada ?? Math.max(item.estoque_minimo - item.estoque_atual, item.estoque_minimo);
            const preco = item._precoUnitPago ?? parseFloat(item.custo_unitario || 0);
            return { qtd, preco, total: qtd * preco };
        }

        function atualizarFooter() {
            const itensSel = todosItens.filter(i => selecionados.has(i.id));
            const totalSel = itensSel.reduce((s, i) => s + getValorReal(i).total, 0);
            document.getElementById('totalSelecionado').innerHTML =
                `${fmt(totalSel)} <span id="countSelecionado" class="text-slate-500 text-sm font-normal">(${itensSel.length} iten${itensSel.length !== 1 ? 's' : ''})</span>`;
        }

        // ── Registrar entradas no estoque ────────────────────────
        window.registrarEntradas = async function () {
            const itensSel = todosItens.filter(i => selecionados.has(i.id));
            if (itensSel.length === 0) {
                alert('Selecione ao menos um item para registrar entrada.');
                return;
            }

            // Valida que todos têm qtd > 0
            for (const item of itensSel) {
                const { qtd } = getValorReal(item);
                if (qtd <= 0) {
                    alert(`Informe a quantidade comprada para "${item.nome}"`);
                    document.getElementById('qtd-' + item.id)?.focus();
                    return;
                }
            }

            const totalReal = itensSel.reduce((s, i) => s + getValorReal(i).total, 0);
            if (!confirm(`Registrar entrada de ${itensSel.length} insumo(s)?\nTotal pago: ${fmt(totalReal)}`)) return;

            try {
                for (const item of itensSel) {
                    const { qtd, preco } = getValorReal(item);
                    const novoEstoque = parseFloat(item.estoque_atual) + qtd;

                    // Atualiza estoque e custo unitário com o preço real pago
                    await supabase.from('insumos').update({
                        estoque_atual: novoEstoque,
                        custo_unitario: preco,
                    }).eq('id', item.id);

                    // Registra movimentação com valores reais
                    await insertRecord('movimentacoes_estoque', {
                        insumo_id: item.id,
                        tipo: 'entrada',
                        quantidade: qtd,
                        estoque_anterior: parseFloat(item.estoque_atual),
                        estoque_atual: novoEstoque,
                        custo_unitario: preco,
                        motivo: 'Lista de Compras Inteligente',
                        referencia_tipo: 'compra',
                    });
                }

                alert(`✅ Entrada registrada para ${itensSel.length} insumo(s)!\nCusto unitário atualizado.`);
                selecionados.clear();
                await loadData();
            } catch (err) {
                console.error(err);
                alert('Erro ao registrar entradas. Tente novamente.');
            }
        };

        // ── Carregar dados ───────────────────────────────────────
        async function loadData() {
            try {
                const { data: insumos, error } = await getAllRecords('insumos');
                if (error) throw error;

                // Filtra apenas ativo e com estoque abaixo do mínimo
                const precisa = (insumos || []).filter(i =>
                    i.ativo !== false &&
                    parseFloat(i.estoque_atual || 0) <= parseFloat(i.estoque_minimo || 0)
                );

                // Calcula valor sugerido: sugestão × custo_unitario
                precisa.forEach(i => {
                    const sugestao = Math.max(
                        parseFloat(i.estoque_minimo || 0) - parseFloat(i.estoque_atual || 0),
                        parseFloat(i.estoque_minimo || 0)
                    );
                    i.valorSugerido = sugestao * parseFloat(i.custo_unitario || 0);
                });

                // Classifica ABC pelo valor sugerido
                todosItens = classificarABC(precisa);

                // Atualiza summary cards
                const totalGeral = todosItens.reduce((s, i) => s + i.valorSugerido, 0);
                document.getElementById('totalInvestimento').textContent = fmt(totalGeral);
                document.getElementById('totalItens').textContent = `${todosItens.length} iten${todosItens.length !== 1 ? 's' : ''}`;

                renderLista();

            } catch (err) {
                console.error('Erro ao carregar lista de compras:', err);
                document.getElementById('mainContent').innerHTML = `
                    <div class="text-center py-16 text-red-400">
                        <span class="material-symbols-outlined text-4xl block mb-2">error</span>
                        <p class="font-semibold">Erro ao carregar dados</p>
                        <p class="text-xs mt-1 text-slate-500">${err?.message || ''}</p>
                    </div>`;
            }
        }

        loadData();

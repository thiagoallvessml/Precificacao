<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-dark": "#0F0F0F",
                        "card-dark": "#1A1A1A",
                        "exit-red": "#ff4d4d"
                    },
                    fontFamily: { "display": ["Work Sans", "sans-serif"] },
                },
            },
        }
    </script>
    <title>Histórico de Movimentações</title>
    <style>
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #0F0F0F;
        }

        .glass-header {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background-dark text-white min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-header px-4 py-4 flex items-center justify-between max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <button onclick="history.back()"
                class="text-primary hover:bg-white/10 rounded-full p-1 transition-colors -ml-1">
                <span class="material-symbols-outlined text-2xl">arrow_back</span>
            </button>
            <span class="material-symbols-outlined text-primary">history</span>
            <h1 class="text-white text-xl font-bold tracking-tight">Movimentações</h1>
        </div>
        <span id="totalCount" class="text-xs text-slate-400 font-medium"></span>
    </header>

    <main class="flex flex-col pb-24 max-w-7xl mx-auto">

        <!-- Cards de Resumo -->
        <div class="grid grid-cols-2 gap-3 px-4 pt-4">
            <!-- Entradas -->
            <div onclick="setFiltro('entrada')"
                class="cursor-pointer bg-card-dark border border-primary/20 rounded-2xl p-4 flex flex-col gap-1 hover:border-primary/40 transition-all active:scale-95">
                <div class="flex items-center gap-2">
                    <div class="flex items-center justify-center size-8 rounded-lg bg-primary/15">
                        <span class="material-symbols-outlined text-primary text-lg">north_east</span>
                    </div>
                    <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Entradas</span>
                </div>
                <p id="totalEntradaValor" class="text-xl font-bold text-primary mt-1">R$ 0,00</p>
                <p id="totalEntradaQtd" class="text-xs text-slate-500">0 registros</p>
            </div>
            <!-- Saídas -->
            <div onclick="setFiltro('saida')"
                class="cursor-pointer bg-card-dark border border-exit-red/20 rounded-2xl p-4 flex flex-col gap-1 hover:border-exit-red/40 transition-all active:scale-95">
                <div class="flex items-center gap-2">
                    <div class="flex items-center justify-center size-8 rounded-lg bg-exit-red/15">
                        <span class="material-symbols-outlined text-exit-red text-lg">south_east</span>
                    </div>
                    <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Saídas</span>
                </div>
                <p id="totalSaidaValor" class="text-xl font-bold text-exit-red mt-1">R$ 0,00</p>
                <p id="totalSaidaQtd" class="text-xs text-slate-500">0 registros</p>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="px-4 py-4">
            <div class="flex w-full items-stretch rounded-xl h-12 bg-card-dark border border-white/5">
                <div class="text-slate-400 flex items-center justify-center pl-4">
                    <span class="material-symbols-outlined">search</span>
                </div>
                <input id="searchInput" oninput="filtrar()"
                    class="flex w-full flex-1 border-none bg-transparent focus:ring-0 text-white placeholder:text-slate-500 px-3 text-base"
                    placeholder="Buscar insumo ou motivo..." />
            </div>
        </div>

        <!-- Filter Chips -->
        <div class="flex gap-3 px-4 pb-4 overflow-x-auto no-scrollbar">
            <button id="chip-todos" onclick="setFiltro('todos')"
                class="flex h-9 shrink-0 items-center gap-x-2 rounded-full bg-primary px-5 text-background-dark text-sm font-semibold transition-all">
                Todas
            </button>
            <button id="chip-entrada" onclick="setFiltro('entrada')"
                class="flex h-9 shrink-0 items-center gap-x-2 rounded-full bg-card-dark border border-white/5 px-5 text-white text-sm font-medium hover:bg-white/5 transition-all">
                ↑ Entradas
            </button>
            <button id="chip-saida" onclick="setFiltro('saida')"
                class="flex h-9 shrink-0 items-center gap-x-2 rounded-full bg-card-dark border border-white/5 px-5 text-white text-sm font-medium hover:bg-white/5 transition-all">
                ↓ Saídas (Produções)
            </button>
        </div>

        <!-- Lista -->
        <div id="lista" class="flex flex-col gap-3 px-4 mt-2">
            <div class="text-center py-16 text-slate-500">
                <span class="material-symbols-outlined text-5xl block mb-2 animate-pulse">hourglass_empty</span>
                Carregando...
            </div>
        </div>

    </main>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 glass-header flex justify-around py-3 px-6 max-w-7xl mx-auto">
        <button onclick="window.location.href='index.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition-colors">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-medium">Home</span>
        </button>
        <button onclick="window.location.href='movimentacoes.html'"
            class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">history</span>
            <span class="text-[10px] font-medium">Histórico</span>
        </button>
        <button onclick="window.location.href='estoque.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition-colors">
            <span class="material-symbols-outlined">inventory</span>
            <span class="text-[10px] font-medium">Estoque</span>
        </button>
        <button onclick="window.location.href='gestao-insumos.html'"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-white transition-colors">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-medium">Ajustes</span>
        </button>
    </div>

    <script type="module">
        import { getSupabase } from './supabase-client.js';
        const supabase = getSupabase();

        let todas = [];
        let filtroAtual = 'todos';

        // ── CARREGAR ──────────────────────────────────────────────────────
        async function carregar() {
            const { data, error } = await supabase
                .from('movimentacoes_estoque')
                .select('*, insumos(nome, unidade_medida, custo_unitario)')
                .order('data_movimentacao', { ascending: false })
                .order('created_at', { ascending: false })
                .limit(300);

            if (error) {
                document.getElementById('lista').innerHTML = `
                    <div class="text-center py-16 text-red-400">
                        <span class="material-symbols-outlined text-4xl block mb-2">error</span>
                        <p class="font-semibold">Erro ao carregar</p>
                        <p class="text-xs mt-2 text-slate-500">${error.message}</p>
                        <p class="text-xs mt-1 text-slate-600">Execute fix-movimentacoes-estoque.sql no Supabase</p>
                    </div>`;
                return;
            }

            todas = data || [];
            atualizarCards(todas);
            filtrar();
        }

        // ── CARDS DE RESUMO ───────────────────────────────────────────────
        function atualizarCards(lista) {
            const fmt = v => `R$ ${v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            const calcCusto = m => {
                const cu = parseFloat(m.custo_unitario) || parseFloat(m.insumos?.custo_unitario) || 0;
                return parseFloat(m.custo_total) || (parseFloat(m.quantidade || 0) * cu);
            };

            const entradas = lista.filter(m => m.tipo === 'entrada');
            const saidas = lista.filter(m => m.tipo === 'saida');

            const totalEntrada = entradas.reduce((s, m) => s + calcCusto(m), 0);
            const totalSaida = saidas.reduce((s, m) => s + calcCusto(m), 0);

            document.getElementById('totalEntradaValor').textContent = fmt(totalEntrada);
            document.getElementById('totalEntradaQtd').textContent = `${entradas.length} registro${entradas.length !== 1 ? 's' : ''}`;
            document.getElementById('totalSaidaValor').textContent = fmt(totalSaida);
            document.getElementById('totalSaidaQtd').textContent = `${saidas.length} registro${saidas.length !== 1 ? 's' : ''}`;
        }

        // ── FILTRAR ───────────────────────────────────────────────────────
        window.filtrar = function () {
            const busca = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const lista = todas.filter(m => {
                const nome = (m.insumos?.nome || '').toLowerCase();
                const motivo = (m.motivo || '').toLowerCase();
                const buscaOk = !busca || nome.includes(busca) || motivo.includes(busca);
                const tipoOk = filtroAtual === 'todos' || m.tipo === filtroAtual;
                return buscaOk && tipoOk;
            });
            renderizar(lista);
        };

        window.setFiltro = function (tipo) {
            filtroAtual = tipo;
            ['todos', 'entrada', 'saida'].forEach(t => {
                const chip = document.getElementById(`chip-${t}`);
                if (t === tipo) {
                    chip.className = 'flex h-9 shrink-0 items-center gap-x-2 rounded-full bg-primary px-5 text-background-dark text-sm font-semibold transition-all';
                } else {
                    chip.className = 'flex h-9 shrink-0 items-center gap-x-2 rounded-full bg-card-dark border border-white/5 px-5 text-white text-sm font-medium hover:bg-white/5 transition-all';
                }
            });
            filtrar();
        };

        // ── RENDERIZAR agrupado por data ──────────────────────────────────
        function renderizar(lista) {
            const countEl = document.getElementById('totalCount');
            countEl.textContent = lista.length > 0 ? `${lista.length} registro${lista.length !== 1 ? 's' : ''}` : '';

            if (!lista.length) {
                document.getElementById('lista').innerHTML = `
                    <div class="text-center py-20 text-slate-500">
                        <span class="material-symbols-outlined text-5xl block mb-3">inbox</span>
                        <p class="font-semibold">Nenhuma movimentação encontrada</p>
                        <p class="text-xs mt-1 text-slate-600">As saídas aparecem automaticamente ao registrar produções</p>
                    </div>`;
                return;
            }

            // Agrupar por data
            const grupos = {};
            lista.forEach(m => {
                // Pegar só a parte da data (YYYY-MM-DD), ignorando tempo e timezone
                const rawData = m.data_movimentacao || m.created_at || '?';
                const d = rawData.toString().substring(0, 10); // "2026-03-05"
                if (!grupos[d]) grupos[d] = [];
                grupos[d].push(m);
            });

            const hoje = new Date().toISOString().split('T')[0];
            const ontem = new Date(Date.now() - 86400000).toISOString().split('T')[0];

            let html = '';
            Object.keys(grupos).sort((a, b) => b.localeCompare(a)).forEach(data => {
                let label = data;
                if (data === hoje) label = '📅 Hoje';
                else if (data === ontem) label = 'Ontem';
                else {
                    const [y, mo, d] = data.split('-');
                    label = `${d}/${mo}/${y}`;
                }

                html += `<h3 class="text-slate-400 text-sm font-bold uppercase tracking-widest pt-4 pb-1 border-t border-white/5 first:border-0">${label}</h3>`;

                grupos[data].forEach(m => {
                    const isEntrada = m.tipo === 'entrada';
                    const icone = isEntrada ? 'north_east' : 'south_east';
                    const corIcon = isEntrada ? 'bg-primary/20 text-primary' : 'bg-exit-red/20 text-exit-red';
                    const badge = isEntrada
                        ? 'bg-primary/20 text-primary'
                        : 'bg-exit-red/20 text-exit-red';

                    const nome = m.insumos?.nome || `Insumo #${m.insumo_id}`;
                    const unidade = m.insumos?.unidade_medida || '';
                    const qtd = parseFloat(m.quantidade || 0);

                    // Converte g→kg e ml→L se >= 1000
                    let qtdFmt;
                    if (qtd >= 1000 && (unidade === 'g' || unidade === 'ml')) {
                        const conv = qtd / 1000;
                        const uConv = unidade === 'g' ? 'kg' : 'L';
                        qtdFmt = `${qtd.toLocaleString('pt-BR')} ${unidade} = ${conv.toLocaleString('pt-BR', { maximumFractionDigits: 3 })} ${uConv}`;
                    } else {
                        qtdFmt = `${qtd.toLocaleString('pt-BR', { maximumFractionDigits: 3 })} ${unidade}`;
                    }

                    const motivo = m.motivo || (isEntrada ? 'Entrada de Estoque' : 'Saída');
                    const isProducao = motivo.toLowerCase().startsWith('produção');

                    // Custo: prioriza custo_total salvo, depois calcula custo_unit * qtd
                    const custoUnit = parseFloat(m.custo_unitario) || parseFloat(m.insumos?.custo_unitario) || 0;
                    const custoTotal = parseFloat(m.custo_total) || (qtd * custoUnit);
                    const custoFmt = custoTotal > 0
                        ? `R$ ${custoTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`
                        : null;

                    const estoqueInfo = (m.estoque_anterior != null && m.estoque_posterior != null)
                        ? `${parseFloat(m.estoque_anterior).toLocaleString('pt-BR', { maximumFractionDigits: 1 })} → ${parseFloat(m.estoque_posterior).toLocaleString('pt-BR', { maximumFractionDigits: 1 })} ${unidade}`
                        : '';

                    html += `
                    <div class="flex flex-col gap-2 bg-card-dark p-4 rounded-xl border border-white/5">
                        <div class="flex justify-between items-start gap-3">
                            <div class="flex gap-3 items-center min-w-0">
                                <div class="flex items-center justify-center rounded-xl ${corIcon} size-12 shrink-0">
                                    <span class="material-symbols-outlined">${icone}</span>
                                </div>
                                <div class="min-w-0">
                                    <p class="text-white text-base font-semibold leading-tight truncate">${nome}</p>
                                    <p class="text-slate-400 text-xs mt-0.5">${qtdFmt}</p>
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <span class="text-[10px] font-bold px-2 py-1 rounded-full ${badge}">
                                    ${isEntrada ? 'ENTRADA' : 'SAÍDA'}
                                </span>
                                ${custoFmt ? `<p class="text-sm font-bold mt-1 ${isEntrada ? 'text-primary' : 'text-exit-red'}">${custoFmt}</p>` : ''}
                            </div>
                        </div>
                        <div class="pt-2 border-t border-white/5 flex items-center justify-between gap-2">
                            <div class="flex items-center gap-1.5 min-w-0">
                                <span class="material-symbols-outlined text-[14px] text-slate-500 shrink-0">
                                    ${isProducao ? 'blender' : isEntrada ? 'local_shipping' : 'inventory_2'}
                                </span>
                                <p class="text-slate-500 text-[11px] font-medium uppercase tracking-wide truncate">${motivo}</p>
                            </div>
                            ${estoqueInfo ? `<p class="text-[10px] text-slate-600 shrink-0">${estoqueInfo}</p>` : ''}
                        </div>
                    </div>`;
                });
            });

            document.getElementById('lista').innerHTML = html;
        }

        carregar();
    </script>
</body>

</html>

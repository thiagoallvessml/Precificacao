<!DOCTYPE html>
<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Produção por Lotes - Geladinho Gourmet</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-dark": "#0F0F0F",
                        "card-bg": "#1E1E1E",
                        "card-border": "#2A2A2A",
                    },
                    fontFamily: { "display": ["Work Sans"] },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #0F0F0F;
        }

        .glass-header {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(45, 68, 68, 0.5);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-header px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='index.html'"
                class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold tracking-tight">Produção por Lotes</h1>
        </div>
        <button onclick="window.location.href='producao-dashboard.html'"
            class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
            <span class="material-symbols-outlined text-slate-400">dashboard</span>
        </button>
    </header>

    <main class="p-4 max-w-7xl mx-auto space-y-6">

        <!-- Summary Cards -->
        <section class="flex gap-4 overflow-x-auto no-scrollbar py-2">
            <div class="min-w-[160px] flex-1 bg-card-bg border border-card-border p-4 rounded-xl">
                <span class="material-symbols-outlined text-primary mb-2">layers</span>
                <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Lotes (Mês)</p>
                <p id="statLotes" class="text-2xl font-bold mt-1">—</p>
            </div>
            <div class="min-w-[160px] flex-1 bg-card-bg border border-card-border p-4 rounded-xl">
                <span class="material-symbols-outlined text-primary mb-2">inventory_2</span>
                <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Produzido</p>
                <div class="flex items-baseline gap-1">
                    <p id="statUnidades" class="text-2xl font-bold mt-1">—</p>
                    <span class="text-[10px] text-slate-400">UN</span>
                </div>
            </div>
            <div class="min-w-[160px] flex-1 bg-card-bg border border-card-border p-4 rounded-xl">
                <span class="material-symbols-outlined text-primary mb-2">payments</span>
                <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Custo Total Mês</p>
                <p id="statCusto" class="text-2xl font-bold mt-1 text-primary">R$ —</p>
            </div>
        </section>

        <!-- Filter Chips -->
        <section class="flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="setFiltro('todos')" id="chip-todos"
                class="px-6 py-2 rounded-full bg-primary text-background-dark font-semibold text-sm whitespace-nowrap">
                Todos
            </button>
            <button onclick="setFiltro('mes')" id="chip-mes"
                class="px-6 py-2 rounded-full bg-card-bg border border-card-border text-slate-300 font-medium text-sm whitespace-nowrap hover:border-primary/50 transition-colors">
                Este Mês
            </button>
            <button onclick="setFiltro('semana')" id="chip-semana"
                class="px-6 py-2 rounded-full bg-card-bg border border-card-border text-slate-300 font-medium text-sm whitespace-nowrap hover:border-primary/50 transition-colors">
                Esta Semana
            </button>
            <button onclick="setFiltro('hoje')" id="chip-hoje"
                class="px-6 py-2 rounded-full bg-card-bg border border-card-border text-slate-300 font-medium text-sm whitespace-nowrap hover:border-primary/50 transition-colors">
                Hoje
            </button>
        </section>

        <!-- Batch List -->
        <section class="space-y-4">
            <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-widest px-1">Lotes Recentes</h3>
            <div id="batchList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <div class="col-span-3 flex items-center justify-center py-16 text-slate-500 gap-2">
                    <span class="material-symbols-outlined animate-spin">sync</span>
                    <p class="text-sm">Carregando lotes...</p>
                </div>
            </div>
        </section>

    </main>

    <!-- FAB: Nova Produção -->
    <button onclick="window.location.href='adicionar-producao.html'"
        class="fixed bottom-6 right-6 size-14 rounded-full bg-primary text-background-dark shadow-lg shadow-primary/20 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-40">
        <span class="material-symbols-outlined font-bold text-3xl">add</span>
    </button>



    <script type="module">
        import { getSupabase } from './supabase-client.js';
        const supabase = getSupabase();

        const pad = n => String(n).padStart(2, '0');
        const fmt = v => `R$ ${parseFloat(v || 0).toFixed(2).replace('.', ',')}`;

        const hoje = new Date();
        const hojeStr = `${hoje.getFullYear()}-${pad(hoje.getMonth() + 1)}-${pad(hoje.getDate())}`;
        const anoMes = `${hoje.getFullYear()}-${pad(hoje.getMonth() + 1)}`;

        // Início da semana (segunda-feira)
        const diaSemana = hoje.getDay() === 0 ? 6 : hoje.getDay() - 1;
        const inicioSemana = new Date(hoje);
        inicioSemana.setDate(hoje.getDate() - diaSemana);
        const semanaStr = `${inicioSemana.getFullYear()}-${pad(inicioSemana.getMonth() + 1)}-${pad(inicioSemana.getDate())}`;

        let todasProducoes = [];
        let insumosMap = {};
        let receitasInsumos = [];
        let filtroAtivo = 'todos';

        // ─── FILTRO ───────────────────────────────────────────────────────────────
        window.setFiltro = function (f) {
            filtroAtivo = f;
            ['todos', 'mes', 'semana', 'hoje'].forEach(t => {
                const btn = document.getElementById('chip-' + t);
                btn.className = t === f
                    ? 'px-6 py-2 rounded-full bg-primary text-background-dark font-semibold text-sm whitespace-nowrap'
                    : 'px-6 py-2 rounded-full bg-card-bg border border-card-border text-slate-300 font-medium text-sm whitespace-nowrap hover:border-primary/50 transition-colors';
            });
            renderStats();
            renderList();
        };

        function filtrar(producoes) {
            if (filtroAtivo === 'hoje') return producoes.filter(p => (p.data_producao || '').split('T')[0] === hojeStr);
            if (filtroAtivo === 'semana') return producoes.filter(p => (p.data_producao || '').split('T')[0] >= semanaStr);
            if (filtroAtivo === 'mes') return producoes.filter(p => (p.data_producao || '').startsWith(anoMes));
            return producoes;
        }

        // ─── CUSTO por produção ────────────────────────────────────────────────────
        function calcCusto(prod) {
            const ri = receitasInsumos.filter(r => r.receita_id === prod.receita_id);
            const lotes = prod.quantidade_lotes || 1;
            return ri.reduce((sum, r) => {
                const ins = insumosMap[r.insumo_id];
                return sum + (ins ? (ins.custo_unitario || 0) * (parseFloat(r.quantidade) || 0) * lotes : 0);
            }, 0);
        }

        // ─── RENDER ───────────────────────────────────────────────────────────────
        function renderList() {
            const container = document.getElementById('batchList');
            container.className = 'grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4';

            const lista = filtrar(todasProducoes);

            if (lista.length === 0) {
                container.innerHTML = `
                    <div class="col-span-3 flex flex-col items-center justify-center py-16 text-slate-500 gap-3">
                        <span class="material-symbols-outlined text-5xl opacity-30">factory</span>
                        <p class="text-sm">Nenhum lote encontrado no período.</p>
                        <a href="adicionar-producao.html" class="mt-2 px-5 py-2 rounded-full bg-primary text-background-dark font-semibold text-sm">
                            + Registrar Produção
                        </a>
                    </div>`;
                return;
            }

            container.innerHTML = lista.map((prod, idx) => {
                const custo = calcCusto(prod);
                const data = (prod.data_producao || '').split('T')[0];
                const [y, m, d] = data.split('-');
                const dataFmt = data ? `${d}/${m}/${y}` : '—';
                const isHoje = data === hojeStr;
                const nome = prod.nome_receita || `Receita #${prod.receita_id || '?'}`;
                const loteNum = String(prod.id || idx + 1).padStart(3, '0');
                const unidades = prod.total_unidades || 0;
                const lotes = prod.quantidade_lotes || 1;

                return `
                    <div class="bg-card-bg border border-card-border rounded-xl p-4 space-y-4 hover:border-primary/30 transition-colors">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-lg font-bold">Lote #${loteNum}</h4>
                                <p class="text-xs text-slate-400">${isHoje ? 'Hoje' : dataFmt}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-wider border border-primary/20">
                                Concluído
                            </span>
                        </div>
                        <div class="space-y-1 py-3 border-y border-card-border/50">
                            <div class="flex justify-between text-sm">
                                <span class="text-slate-300 font-medium">${unidades}x ${nome}</span>
                                <span class="text-slate-500 text-xs">${lotes} lote${lotes > 1 ? 's' : ''}</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase font-bold">Custo Total</p>
                                <p class="text-xl font-bold text-primary">${fmt(custo)}</p>
                            </div>
                            <button onclick="window.location.href='adicionar-producao.html'"
                                class="px-4 py-2 rounded-lg bg-primary/10 border border-primary/30 text-primary font-bold text-sm hover:bg-primary hover:text-background-dark transition-all">
                                Adicionar Produção
                            </button>
                        </div>
                    </div>`;
            }).join('');
        }

        // ─── STATS (respeita o filtro ativo) ──────────────────────────────────────
        function renderStats() {
            const lista = filtrar(todasProducoes);
            const lotes = lista.length;
            const unids = lista.reduce((s, p) => s + (p.total_unidades || 0), 0);
            const custoM = lista.reduce((s, p) => s + calcCusto(p), 0);

            // Labels dinâmicos por filtro
            const labels = {
                todos:   ['Lotes (Total)',    'Custo Total'],
                mes:     ['Lotes (Mês)',      'Custo Total Mês'],
                semana:  ['Lotes (Semana)',   'Custo da Semana'],
                hoje:    ['Lotes (Hoje)',     'Custo de Hoje'],
            };
            const [labelLotes, labelCusto] = labels[filtroAtivo] || labels.mes;

            document.querySelector('[id="statLotes"]').closest('div').querySelector('p.text-xs').textContent = labelLotes;
            document.querySelector('[id="statCusto"]').closest('div').querySelector('p.text-xs').textContent = labelCusto;

            document.getElementById('statLotes').textContent = lotes;
            document.getElementById('statUnidades').textContent = unids.toLocaleString('pt-BR');
            document.getElementById('statCusto').textContent = fmt(custoM);
        }

        // ─── LOAD ─────────────────────────────────────────────────────────────────
        async function loadData() {
            try {
                const [
                    { data: producoesRaw },
                    { data: riRaw },
                    { data: insumosRaw },
                ] = await Promise.all([
                    supabase.from('producoes')
                        .select('id, receita_id, nome_receita, data_producao, total_unidades, quantidade_lotes')
                        .order('data_producao', { ascending: false }),
                    supabase.from('receitas_insumos').select('receita_id, insumo_id, quantidade'),
                    supabase.from('insumos').select('id, custo_unitario').eq('ativo', true),
                ]);

                todasProducoes = producoesRaw || [];
                receitasInsumos = riRaw || [];
                (insumosRaw || []).forEach(i => { insumosMap[i.id] = i; });

                renderStats();
                renderList();
            } catch (err) {
                console.error('❌ Erro:', err);
                document.getElementById('batchList').innerHTML = `
                    <div class="col-span-3 text-center py-12 text-red-400">
                        <span class="material-symbols-outlined text-4xl">error</span>
                        <p class="mt-2 text-sm">${err.message}</p>
                    </div>`;
            }
        }

        loadData();
    </script>

</body>

</html>
